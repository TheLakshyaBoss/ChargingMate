<!DOCTYPE html>
<html>
<head>
  <title>Host</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- FONT FIX -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>
<body>

<div class="header">Host</div>

<div class="host-container">

  <div class="profile-card">
    <div class="avatar"><i class="fa-solid fa-user"></i></div>
    <div>
      <div class="name">--</div>
      <div class="phone">--</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Your Chargers</div>
    <div id="chargerList"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./assets/auth.js"></script>
<script src="./assets/navbar.js"></script>

<script>
async function loadHost() {
  const user = JSON.parse(localStorage.getItem("user"));

  const { data } = await window.db
    .from("chargers")
    .select("*")
    .eq("owner_id", user.id);

  document.getElementById("chargerList").innerHTML =
    data.length
      ? data.map(c => `<div class="charger-row">${c.name}</div>`).join("")
      : `<div class="empty">No chargers yet</div>`;
}

loadHost();


// 🔥 REALTIME
window.db.channel("host-bookings")
  .on("postgres_changes", {
    event: "INSERT",
    schema: "public",
    table: "bookings"
  }, async (payload) => {

    const booking = payload.new;

    const { data: charger } = await window.db
      .from("chargers")
      .select("*")
      .eq("id", booking.charger_id)
      .single();

    const user = JSON.parse(localStorage.getItem("user"));

    if (charger.owner_id !== user.id) return;

    showHostPopup(booking.id);
  })
  .subscribe();


// 🔥 HOST POPUP
function showHostPopup(bookingId) {
  const div = document.createElement("div");

  div.className = "modal";

  div.innerHTML = `
    <div class="modal-box">
      <h3>New Request ⚡</h3>

      <button onclick="handleBooking('${bookingId}', 'accepted')">Accept</button>
      <button onclick="handleBooking('${bookingId}', 'rejected')">Reject</button>
    </div>
  `;

  document.body.appendChild(div);
}


// 🔥 HANDLE
async function handleBooking(id, status) {
  await window.db
    .from("bookings")
    .update({ status })
    .eq("id", id);

  document.querySelectorAll(".modal").forEach(m => m.remove());
}


function showBookingPopup() {
  const popup = document.createElement("div");

  popup.className = "booking-popup clean";
  popup.innerHTML = `
    <div>⚡ New booking request</div>
    <button onclick="this.parentElement.remove()">OK</button>
  `;

  document.body.appendChild(popup);
}
</script>

</body>
</html>
