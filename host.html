<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Host - ChargingMate</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="header">Host</div>

  <div class="host-container">

    <!-- 👤 Profile -->
    <div class="profile-card">
      <div class="profile-left">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>

      <div class="profile-right">
        <div class="name">Lakshya</div>
        <div class="phone">+91 98765 43210</div>
      </div>
    </div>

    <!-- 💰 Earnings -->
    <div class="section">
      <div class="section-title">Earnings</div>
      <div class="earnings">₹120</div>
      <div class="subtext">Estimated</div>
    </div>

    <!-- 🔋 Chargers -->
    <div class="section">
      <div class="section-title">Your Chargers</div>
      <div id="chargerList"></div>
    </div>

  </div>

  <!-- Navbar -->
  <script src="./assets/navbar.js"></script>

  <script>
    const chargers = JSON.parse(localStorage.getItem("chargers")) || [];
    const list = document.getElementById("chargerList");

    if (chargers.length === 0) {
      list.innerHTML = `<div class="empty">No chargers yet</div>`;
    } else {
      list.innerHTML = chargers.map(c => `
        <div class="charger-row">
          <i class="fa-solid fa-battery-full"></i>
          <span>${c.name}</span>
        </div>
      `).join("");
    }
  </script>

</body>
</html>
