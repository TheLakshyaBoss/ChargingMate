<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Host - ChargingMate</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="header">Host</div>

  <div class="host-container">

    <!-- Profile -->
    <div class="profile-card">
      <div class="avatar">
        <i class="fa-solid fa-user"></i>
      </div>

      <div class="profile-right">
        <div class="name">--</div>
        <div class="phone">--</div>
      </div>
    </div>

    <!-- Earnings -->
    <div class="section">
      <div class="section-title">Earnings</div>
      <div class="earnings">₹120</div>
      <div class="subtext">Estimated</div>
    </div>

    <!-- Chargers -->
    <div class="section">
      <div class="section-title">Your Chargers</div>
      <div id="chargerList">Loading...</div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./assets/auth.js"></script>
  <script src="./assets/navbar.js"></script>

  <script>
    async function loadChargers() {
      const user = JSON.parse(localStorage.getItem("user"));
      if (!user) return;

      const { data, error } = await supabase
        .from("chargers")
        .select("*")
        .eq("owner_id", user.id);

      const list = document.getElementById("chargerList");

      if (error) {
        list.innerText = "Error loading chargers";
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = `<div class="empty">No chargers yet</div>`;
        return;
      }

      list.innerHTML = data.map(c => `
        <div class="charger-row">
          <i class="fa-solid fa-battery-full"></i>
          <span>${c.name}</span>
        </div>
      `).join("");
    }

    document.addEventListener("DOMContentLoaded", loadChargers);
  </script>

</body>
</html>
